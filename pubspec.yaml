name: xps_converter
description: A Flutter XPS file converter application
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flex_color_scheme: ^8.3.0
  google_fonts: ^6.3.2

  # Network
  http: ^1.2.1
  dio: ^5.9.0

  # File handling
  file_picker: ^10.3.3
  path_provider: ^2.1.3
  open_file: ^3.3.4

  # State management
  provider: ^6.1.2

  # Utils
  path: ^1.9.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
